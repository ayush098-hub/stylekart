server:
  port: 8080

spring:
  main:
    web-application-type: reactive

  application:
    name: api-gateway

  cloud:
    loadbalancer:
      enabled: false   # 🚨 DISABLE load balancer completely

    gateway:
      httpclient:
        connect-timeout: 5000
        response-timeout: 10s

      routes:
        - id: user-service
          uri: ${USER_SERVICE_URI}
          predicates:
            - Path=/api/auth/**

        - id: product-service
          uri: ${PRODUCT_SERVICE_URI}
          predicates:
            - Path=/api/products/**, /api/categories/**

        - id: order-service
          uri: ${ORDER_SERVICE_URI}
          predicates:
            - Path=/api/orders/**

        - id: payment-service
          uri: ${PAYMENT_SERVICE_URI}
          predicates:
            - Path=/api/payments/**

      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "${CORS_ALLOWED_ORIGIN:http://localhost:3000}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
    reactor.netty: DEBUG
