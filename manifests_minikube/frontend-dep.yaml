apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend-pod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: frontend-cont
        image: frontend-service:latest
        ports:
        - containerPort: 80
        imagePullPolicy: Never
        env:
          - name: DB_HOST
            value: stylekart-db-svc

