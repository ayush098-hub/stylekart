apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-pod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment
  template:
    metadata:
      labels:
        app: payment
    spec:
      containers:
      - name: payment-cont
        image: payment-service:latest
        ports:
        - containerPort: 8084
        imagePullPolicy: Never
        env:
          - name: DB_HOST
            value: stylekart-db-svc

