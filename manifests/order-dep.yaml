apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-pod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: order
  template:
    metadata:
      labels:
        app: order
    spec:
      containers:
      - name: order-cont
        image: order-service:latest
        ports:
        - containerPort: 8083
        imagePullPolicy: Never
        env:
          - name: DB_HOST
            value: stylekart-db-svc

